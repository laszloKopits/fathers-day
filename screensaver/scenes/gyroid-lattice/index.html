<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gyroid Lattice</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Gyroid Lattice — ray-marched triply periodic minimal surface (TPMS). The
// camera glides on a slow Lissajous path through an infinite cellular
// structure that morphs continuously between gyroid, Schwarz-P, and Schwarz-D
// surfaces. Two long-period LFOs drive the morph parameter and the shell
// thickness, while a third drifts the palette through three keyframes. No
// element holds a fixed screen position, so burn-in risk is minimal.

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, premultipliedAlpha: false });
if (!gl) {
  document.body.innerHTML = '<div style="color:#666;font:14px sans-serif;padding:24px">WebGL2 required</div>';
  throw new Error('no webgl2');
}

function resize() {
  // Render at a slightly reduced resolution; the GPU work per pixel is heavy.
  const dpr = Math.min(window.devicePixelRatio, 1.25);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
}
window.addEventListener('resize', resize);
resize();

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}

const VS = `#version 300 es
  in vec2 a_pos;
  void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const FS = `#version 300 es
  precision highp float;
  out vec4 outColor;
  uniform float u_time;
  uniform vec2 u_res;

  // --- TPMS implicit functions. f(p) = 0 is the surface.
  // All functions normalized so |f| ≲ 1 — keeps the morph between surfaces
  // visually consistent (same effective wall thickness across the cycle).
  float gyroidF(vec3 p) {
    return (sin(p.x) * cos(p.y) + sin(p.y) * cos(p.z) + sin(p.z) * cos(p.x)) / 1.5;
  }
  float schwarzP(vec3 p) {
    return (cos(p.x) + cos(p.y) + cos(p.z)) / 3.0;
  }
  float schwarzD(vec3 p) {
    return (sin(p.x) * sin(p.y) * sin(p.z)
         + sin(p.x) * cos(p.y) * cos(p.z)
         + cos(p.x) * sin(p.y) * cos(p.z)
         + cos(p.x) * cos(p.y) * sin(p.z)) / 2.0;
  }

  // Smooth morph through gyroid → P → D → gyroid as m winds around [0,3).
  float tpms(vec3 p, float m) {
    float seg = mod(m, 3.0);
    float k;
    if (seg < 1.0) {
      k = smoothstep(0.0, 1.0, seg);
      return mix(gyroidF(p), schwarzP(p), k);
    } else if (seg < 2.0) {
      k = smoothstep(0.0, 1.0, seg - 1.0);
      return mix(schwarzP(p), schwarzD(p), k);
    } else {
      k = smoothstep(0.0, 1.0, seg - 2.0);
      return mix(schwarzD(p), gyroidF(p), k);
    }
  }

  // The "scene field" is positive in the void, negative inside the slab
  // |tpms|<thickness. The surface lives at scene(p) == 0; we hit it by
  // sign-change marching, which is robust to thin walls and tangential rays.
  float scene(vec3 p) {
    float m = 0.7 + u_time * 0.018;          // ~5.6 min per full surface cycle
    float th = 0.34 + 0.10 * sin(u_time * 0.027);
    return abs(tpms(p * 1.7, m)) - th;
  }

  vec3 calcNormal(vec3 p) {
    float h = 0.012;
    vec2 e = vec2(h, 0.0);
    return normalize(vec3(
      scene(p + e.xyy) - scene(p - e.xyy),
      scene(p + e.yxy) - scene(p - e.yxy),
      scene(p + e.yyx) - scene(p - e.yyx)
    ));
  }

  // Cheap soft shadow ray-march toward a directional light.
  float softShadow(vec3 ro, vec3 rd) {
    float res = 1.0;
    float t = 0.05;
    for (int i = 0; i < 24; i++) {
      float h = scene(ro + rd * t);
      if (h < 0.001) return 0.15;
      res = min(res, 8.0 * h / t);
      t += clamp(h, 0.04, 0.4);
      if (t > 4.0) break;
    }
    return clamp(res, 0.15, 1.0);
  }

  // Three-stop palette interpolation by k∈[0,1].
  vec3 paletteOf(float k, vec3 a, vec3 b, vec3 c) {
    return mix(mix(a, b, smoothstep(0.0, 0.5, k)),
               c, smoothstep(0.5, 1.0, k));
  }

  void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / min(u_res.x, u_res.y);
    float t = u_time;

    // Camera flies forward through the lattice on a slow Lissajous, looking
    // slightly ahead of itself so the motion feels like gliding, not panning.
    float fwdSpeed = 0.55;
    vec3 ro = vec3(
      1.4 * sin(t * 0.061),
      1.1 * cos(t * 0.047),
      t * fwdSpeed
    );
    float dt = 1.6;
    vec3 target = vec3(
      1.4 * sin((t + dt) * 0.061),
      1.1 * cos((t + dt) * 0.047),
      (t + dt) * fwdSpeed
    );

    vec3 fwd = normalize(target - ro);
    // Slowly rolling up-vector keeps the framing fresh.
    float roll = 0.25 * sin(t * 0.019);
    vec3 worldUp = vec3(sin(roll), cos(roll), 0.0);
    vec3 right = normalize(cross(fwd, worldUp));
    vec3 up = cross(right, fwd);

    vec3 rd = normalize(uv.x * right + uv.y * up + 1.4 * fwd);

    // Fixed-step march detecting the void→wall boundary (where the slab field
    // crosses from positive to negative). Starting inside a wall is benign:
    // we march out first, then catch the next entry. Fixed step keeps the
    // march safe against thin walls regardless of gradient.
    const float STEP = 0.085;
    float dist = 0.0;
    bool hit = false;
    vec3 p = ro;
    float prev = scene(ro);
    for (int i = 0; i < 300; i++) {
      dist += STEP;
      if (dist > 24.0) break;
      p = ro + rd * dist;
      float d = scene(p);
      if (prev > 0.0 && d <= 0.0) {
        float k = prev / (prev - d);     // ∈ (0,1)
        dist -= STEP * (1.0 - k);
        p = ro + rd * dist;
        hit = true;
        break;
      }
      prev = d;
    }

    // Three palette keyframes the scene drifts between (long-period crossfade
    // so the composition never settles). Each keyframe is a 3-stop gradient.
    vec2 pulse = vec2(
      0.5 + 0.5 * sin(t * 0.013),
      0.5 + 0.5 * sin(t * 0.011 + 2.1)
    );
    // Three keyframes: deep oceanic, warm sunset, neon dusk.
    vec3 cA1 = vec3(0.05, 0.10, 0.30), cA2 = vec3(0.30, 0.55, 0.85), cA3 = vec3(0.95, 0.80, 0.55);
    vec3 cB1 = vec3(0.25, 0.05, 0.18), cB2 = vec3(0.95, 0.40, 0.20), cB3 = vec3(1.00, 0.92, 0.55);
    vec3 cC1 = vec3(0.10, 0.04, 0.35), cC2 = vec3(0.65, 0.20, 0.85), cC3 = vec3(0.30, 0.95, 0.85);

    vec3 stop1 = mix(mix(cA1, cB1, pulse.x), cC1, pulse.y);
    vec3 stop2 = mix(mix(cA2, cB2, pulse.x), cC2, pulse.y);
    vec3 stop3 = mix(mix(cA3, cB3, pulse.x), cC3, pulse.y);

    vec3 col;
    if (hit) {
      vec3 n = calcNormal(p);
      vec3 ldir = normalize(vec3(0.6, 0.75, -0.3));
      float diff = clamp(dot(n, ldir), 0.0, 1.0);
      float amb = 0.35 + 0.30 * (0.5 + 0.5 * n.y);   // sky/ground hemispheric
      float sh = softShadow(p + n * 0.02, ldir);
      float rim = pow(clamp(1.0 + dot(n, rd), 0.0, 1.0), 2.2);
      float spec = pow(clamp(dot(reflect(rd, n), ldir), 0.0, 1.0), 20.0);

      // Color key: combines position phase and surface orientation so adjacent
      // cells differ gently and the overall hue drifts over minutes.
      float key = 0.5 + 0.5 * sin(
        0.32 * (p.x + p.y + p.z) + 0.6 * n.y + t * 0.045
      );

      vec3 base = paletteOf(key, stop1, stop2, stop3);

      col = base * (amb + 0.95 * diff * sh);
      col += rim * 0.60 * mix(stop3, stop2, 0.4);
      col += spec * 0.35 * sh;

      // Distance fog into deep background — softens silhouettes and prevents
      // any harsh outer edge.
      float fog = 1.0 - exp(-dist * 0.085);
      vec3 fogCol = mix(stop1 * 0.55, vec3(0.02, 0.02, 0.04), 0.55);
      col = mix(col, fogCol, fog);
    } else {
      // Empty void — picks up the current palette's darkest tone.
      col = stop1 * 0.22;
    }

    // Mild vignette, then a gentle Reinhard-ish tonemap that preserves
    // saturation without crushing midtones.
    float r = length(uv);
    col *= smoothstep(1.6, 0.0, r * 0.85);
    col = col / (col + vec3(1.6));
    col *= 1.7;
    col = pow(col, vec3(0.95));

    outColor = vec4(col, 1.0);
  }
`;

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_res');

const start = performance.now();
function frame(now) {
  const t = (now - start) / 1000;
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
