<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radiolaria</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #04050a; overflow: hidden; }
  canvas { display: block; }
  /* soft vignette so edges stay dark — framing + anti burn-in */
  #vig {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 75% 75% at 50% 48%,
      rgba(0,0,0,0) 42%, rgba(2,3,8,0.55) 78%, rgba(2,3,8,0.92) 100%);
  }
</style>
</head>
<body>
<script src="../../lib/three.min.js"></script>
<div id="vig"></div>
<script>
// Radiolaria — a single morphing 3D supershape (Gielis superformula) rendered as
// a smooth iridescent solid, like a glass radiolarian / diatom / seed-pod tumbling
// in deep water. The surface is a UV-sphere whose radius is the product of two
// superformula profiles (equatorial × meridional). Twelve shape parameters drift
// on mutually-incommensurate slow LFOs, so the creature morphs continuously through
// star, flower, gem and pod forms without ever repeating. A custom shader gives it
// an oil-on-water iridescence with a glowing fresnel rim; two coloured lights orbit
// slowly so highlights roam, the whole body drifts on a Lissajous path and tumbles,
// and faint bokeh motes drift behind it for depth. Everything moves on minute-scale
// periods — slow, hypnotic, and nothing holds a fixed screen position.

const BG = new THREE.Color(0x04050a);
const scene = new THREE.Scene();
scene.background = BG;

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0, 8.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'low-power' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---- geometry: welded UV sphere, lon wraps so the seam shades smoothly ----
const LON = 180;          // columns around the equator (wrapped)
const LAT = 120;          // rows pole-to-pole
const ROWS = LAT + 1;
const NVERT = LON * ROWS;

// fixed angular grid — precompute trig once, only radii change per frame
const cosT = new Float32Array(LON), sinT = new Float32Array(LON);
for (let i = 0; i < LON; i++) {
  const th = -Math.PI + (2 * Math.PI * i) / LON;   // [-pi, pi)
  cosT[i] = Math.cos(th); sinT[i] = Math.sin(th);
}
const cosP = new Float32Array(ROWS), sinP = new Float32Array(ROWS);
for (let j = 0; j < ROWS; j++) {
  const ph = -Math.PI / 2 + (Math.PI * j) / LAT;   // [-pi/2, pi/2]
  cosP[j] = Math.cos(ph); sinP[j] = Math.sin(ph);
}
// per-frame scratch for the two 1-D superformula profiles
const r1 = new Float32Array(LON);   // equatorial, function of theta
const r2 = new Float32Array(ROWS);  // meridional, function of phi

const positions = new Float32Array(NVERT * 3);
const geom = new THREE.BufferGeometry();
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const indices = [];
for (let i = 0; i < LON; i++) {
  const iN = (i + 1) % LON;
  for (let j = 0; j < LAT; j++) {
    const a = i * ROWS + j;
    const b = iN * ROWS + j;
    const c = i * ROWS + j + 1;
    const d = iN * ROWS + j + 1;
    indices.push(a, c, b, b, c, d);
  }
}
geom.setIndex(indices);

// Gielis superformula radius for one angle (with guards against blow-up)
function superR(angle, m, n1, n2, n3) {
  const t = m * angle * 0.25;
  let a = Math.abs(Math.cos(t));
  let b = Math.abs(Math.sin(t));
  a = Math.pow(a, n2);
  b = Math.pow(b, n3);
  let s = a + b;
  if (s < 1e-6) s = 1e-6;
  let r = Math.pow(s, -1 / n1);
  if (!isFinite(r)) r = 2.6;
  return r > 2.6 ? 2.6 : r;          // clamp so a spike can't fling off-screen
}

let smoothScale = 1;
function rebuild(t) {
  // twelve parameters, all on incommensurate periods (seconds). Ranges are tuned
  // to sweep through sea-urchin, star, flower, gem and seed-pod forms. Low n1 ->
  // spikier lobes; m sets the lobe count.
  const cl1 = (x) => (x < 0.30 ? 0.30 : x);   // n1 floor: tame the spike height
  const cl  = (x) => (x < 0.20 ? 0.20 : x);   // n2/n3 floor
  // Equatorial profile carries the spiky variety (n1 spans 0.3 urchin .. 1.3 round);
  // meridional profile is kept fuller so the body never collapses to a flat cross.
  const m1  = 8.0 + 3.5 * Math.sin(t / 30.0);            // 4.5..11.5 equatorial lobes
  const n11 = cl1(0.75 + 0.55 * Math.sin(t / 44.0));
  const n12 = cl(0.65 + 0.60 * Math.sin(t / 38.0 + 1.1));
  const n13 = cl(0.65 + 0.60 * Math.sin(t / 49.0 + 2.3));
  const m2  = 5.5 + 2.5 * Math.sin(t / 54.0 + 1.0);      // 3..8 meridional lobes
  const n21 = cl1(1.00 + 0.45 * Math.sin(t / 41.0 + 2.0));
  const n22 = cl(0.95 + 0.45 * Math.sin(t / 36.0 + 0.5));
  const n23 = cl(0.95 + 0.45 * Math.sin(t / 52.0 + 1.5));

  for (let i = 0; i < LON; i++) {
    const th = -Math.PI + (2 * Math.PI * i) / LON;
    r1[i] = superR(th, m1, n11, n12, n13);
  }
  for (let j = 0; j < ROWS; j++) {
    const ph = -Math.PI / 2 + (Math.PI * j) / LAT;
    r2[j] = superR(ph, m2, n21, n22, n23);
  }

  let maxR = 1e-3;
  const arr = positions;
  for (let i = 0; i < LON; i++) {
    const ri = r1[i], cx = cosT[i], sx = sinT[i];
    let k = i * ROWS * 3;
    for (let j = 0; j < ROWS; j++) {
      const rr = ri * r2[j];
      const cp = cosP[j];
      const x = rr * cx * cp;
      const y = rr * sx * cp;
      const z = r2[j] * sinP[j];
      arr[k] = x; arr[k + 1] = y; arr[k + 2] = z;
      const d2 = x * x + y * y + z * z;
      if (d2 > maxR) maxR = d2;
      k += 3;
    }
  }
  // smooth auto-scale so the body breathes but never out-grows the frame
  const target = 2.95 / Math.sqrt(maxR);
  smoothScale += (target - smoothScale) * 0.04;

  geom.attributes.position.needsUpdate = true;
  geom.computeVertexNormals();
  geom.attributes.normal.needsUpdate = true;
}

// ---- iridescent shader ----
const uniforms = {
  uTime:       { value: 0 },
  uLight1:     { value: new THREE.Vector3(0.6, 0.5, 0.6) },
  uLight2:     { value: new THREE.Vector3(-0.5, -0.3, 0.4) },
  uCol1:       { value: new THREE.Color(1.0, 0.86, 0.7) },   // warm key
  uCol2:       { value: new THREE.Color(0.62, 0.8, 1.0) },   // cool fill
  uPhase:      { value: 0 },
  uFog:        { value: BG.clone() },
  uFogDensity: { value: 0.018 },
};

const material = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: `
    varying vec3 vN; varying vec3 vView; varying vec3 vWorld;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vView = mv.xyz;
      vN = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform float uTime, uPhase, uFogDensity;
    uniform vec3 uLight1, uLight2, uCol1, uCol2, uFog;
    varying vec3 vN; varying vec3 vView; varying vec3 vWorld;

    vec3 pal(float t) {
      // slightly lifted floor so no hue goes muddy-dark
      return 0.52 + 0.48 * cos(6.28318530718 * (t + vec3(0.0, 0.33, 0.67)));
    }
    void main() {
      vec3 N = normalize(vN);
      vec3 V = normalize(-vView);
      if (dot(N, V) < 0.0) N = -N;                 // light back faces too
      float ndv = max(dot(N, V), 0.0);
      float fres = pow(1.0 - ndv, 3.0);

      vec3 L1 = normalize(uLight1);
      vec3 L2 = normalize(uLight2);
      float d1 = pow(max(dot(N, L1) * 0.5 + 0.5, 0.0), 1.6);   // soft half-lambert
      float d2 = pow(max(dot(N, L2) * 0.5 + 0.5, 0.0), 1.6);
      float s1 = pow(max(dot(N, normalize(L1 + V)), 0.0), 64.0);
      float s2 = pow(max(dot(N, normalize(L2 + V)), 0.0), 64.0);

      // coherent iridescence: a tight hue band sweeps centre -> rim so the body
      // reads as one colour with a complementary rim, the whole band drifting slowly
      float irid = uPhase + fres * 0.30 + dot(N, V) * 0.12
                 + 0.06 * sin(vWorld.x * 1.1 + vWorld.y * 0.7 - vWorld.z * 0.9);
      vec3 base = pal(irid);

      vec3 col = base * 0.22;                        // ambient
      col += base * (0.45 + 0.55 * ndv) * 0.38;     // camera-facing inner glow
      col += base * uCol1 * d1 * 0.85;
      col += base * uCol2 * d2 * 0.85;
      col += (uCol1 * s1 + uCol2 * s2) * 0.65;      // roaming specular glints
      col += pal(uPhase + 0.45) * fres * 1.15;      // glowing complementary rim

      float dist = length(vView);
      float fogF = 1.0 - exp(-uFogDensity * dist * dist);
      col = mix(col, uFog, clamp(fogF, 0.0, 1.0));
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

const mesh = new THREE.Mesh(geom, material);
mesh.frustumCulled = false;
const body = new THREE.Group();
body.add(mesh);
scene.add(body);

// ---- bokeh motes for depth / peripheral motion ----
function moteTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grd.addColorStop(0, 'rgba(255,255,255,0.9)');
  grd.addColorStop(0.25, 'rgba(255,255,255,0.35)');
  grd.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grd; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
const NMOTE = 90;
const motePos = new Float32Array(NMOTE * 3);
const moteCol = new Float32Array(NMOTE * 3);
for (let i = 0; i < NMOTE; i++) {
  // deterministic scatter in a wide shell behind/around the body
  const a = i * 2.39996323;                    // golden angle
  const rad = 6 + (i % 17) * 0.9;
  motePos[i * 3]     = Math.cos(a) * rad * (0.6 + 0.4 * Math.sin(i));
  motePos[i * 3 + 1] = Math.sin(a * 0.7) * rad * 0.55;
  motePos[i * 3 + 2] = -4 - (i % 13) * 1.3;
  const c = 0.4 + 0.5 * (i % 5) / 5;
  moteCol[i * 3] = c * 0.8; moteCol[i * 3 + 1] = c * 0.9; moteCol[i * 3 + 2] = c;
}
const moteGeom = new THREE.BufferGeometry();
moteGeom.setAttribute('position', new THREE.BufferAttribute(motePos, 3));
moteGeom.setAttribute('color', new THREE.BufferAttribute(moteCol, 3));
const motes = new THREE.Points(moteGeom, new THREE.PointsMaterial({
  size: 0.9, map: moteTexture(), vertexColors: true,
  transparent: true, opacity: 0.5, depthWrite: false,
  blending: THREE.AdditiveBlending, sizeAttenuation: true,
}));
scene.add(motes);

// ---- animation ----
const start = performance.now();
function animate(now) {
  const t = (now - start) / 1000;
  uniforms.uTime.value = t;

  rebuild(t);
  mesh.scale.setScalar(smoothScale);

  // wandering tumble (not a constant spin) + Lissajous drift across the frame
  body.rotation.x = 0.5 * Math.sin(t * 0.021) + t * 0.012;
  body.rotation.y = t * 0.018 + 0.6 * Math.sin(t * 0.015 + 1.0);
  body.rotation.z = 0.35 * Math.sin(t * 0.013 + 2.0);
  body.position.x = 1.35 * Math.sin(t * 0.024);
  body.position.y = 0.95 * Math.sin(t * 0.019 + 1.7);

  // orbiting lights -> roaming highlights
  uniforms.uLight1.value.set(Math.cos(t * 0.05) * 0.9, 0.55 + 0.3 * Math.sin(t * 0.03), Math.sin(t * 0.05) * 0.9);
  uniforms.uLight2.value.set(Math.cos(t * 0.037 + 2.5) * 0.9, -0.4 + 0.3 * Math.sin(t * 0.041), Math.sin(t * 0.037 + 2.5) * 0.9 + 0.4);

  // slow palette + light-colour drift (minute scale)
  uniforms.uPhase.value = t * 0.006;
  const w = 0.5 + 0.5 * Math.sin(t * 0.011);
  uniforms.uCol1.value.setHSL((0.06 + 0.12 * Math.sin(t * 0.009)) % 1, 0.55, 0.62);
  uniforms.uCol2.value.setHSL((0.55 + 0.15 * Math.sin(t * 0.007 + 2.0)) % 1, 0.5, 0.6 + 0.05 * w);

  motes.rotation.y = t * 0.006;
  motes.rotation.x = 0.1 * Math.sin(t * 0.004);

  // gentle camera breathing
  camera.position.z = 8.2 + 0.6 * Math.sin(t * 0.017);
  camera.position.y = 0.4 * Math.sin(t * 0.011);
  camera.lookAt(body.position.x * 0.4, body.position.y * 0.4, 0);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
