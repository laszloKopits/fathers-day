<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Plasma Field</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Plasma — sum of sine waves modulated through a slow palette drift, rendered
// on the GPU as a single full-screen fragment shader. The classic demoscene
// effect: smooth, colorful, hypnotic, no static features (excellent burn-in
// hygiene). Wave frequencies/phases retune every ~30s so it never repeats.

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, premultipliedAlpha: false });
if (!gl) {
  document.body.innerHTML = '<div style="color:#666;font:14px sans-serif;padding:24px">WebGL2 required</div>';
  throw new Error('no webgl2');
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
}
window.addEventListener('resize', resize);
resize();

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}

const VS = `#version 300 es
  in vec2 a_pos;
  out vec2 v_uv;
  void main() {
    v_uv = a_pos;
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }
`;

const FS = `#version 300 es
  precision highp float;
  in vec2 v_uv;
  out vec4 outColor;
  uniform float u_time;
  uniform vec2 u_res;
  uniform vec4 u_freq; // freqs for the four wave generators
  uniform vec4 u_phase;

  // Three-stop palette interpolation by t∈[0,1].
  vec3 palette(float t, vec3 a, vec3 b, vec3 c) {
    return mix(mix(a, b, smoothstep(0.0, 0.5, t)),
               c, smoothstep(0.5, 1.0, t));
  }

  void main() {
    // Aspect-correct coordinates centered at origin.
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / min(u_res.x, u_res.y);
    float t = u_time;

    // Classic plasma: sum of 4 sine generators (linear, radial, two centered).
    float v = 0.0;
    v += sin(uv.x * u_freq.x + t * 0.7 + u_phase.x);
    v += sin(uv.y * u_freq.y + t * 0.5 + u_phase.y);
    vec2 c1 = vec2(sin(t * 0.3) * 0.6, cos(t * 0.25) * 0.6);
    v += sin(length(uv - c1) * u_freq.z + t * 0.6 + u_phase.z);
    vec2 c2 = vec2(cos(t * 0.21) * 0.5, sin(t * 0.19) * 0.5);
    v += sin(length(uv + c2) * u_freq.w - t * 0.4 + u_phase.w);

    // Normalize [-4,4] → [0,1]
    float p = 0.5 + 0.125 * v;

    // Slow palette rotation through three keyframes — warm sunset → cool teal →
    // violet → warm sunset.
    vec3 cA = vec3(0.95, 0.45, 0.30);  // warm
    vec3 cB = vec3(0.15, 0.55, 0.65);  // teal
    vec3 cC = vec3(0.45, 0.20, 0.65);  // violet
    float pulse = 0.5 + 0.5 * sin(t * 0.06);
    vec3 colA = mix(cA, cB, pulse);
    vec3 colB = mix(cB, cC, pulse);
    vec3 colC = mix(cC, cA, pulse);

    vec3 col = palette(p, colA, colB, colC);
    // Subtle vignette so the edges feel slightly receded.
    float r = length(uv) * 0.7;
    col *= smoothstep(1.4, 0.0, r);
    outColor = vec4(col, 1.0);
  }
`;

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_res');
const uFreq = gl.getUniformLocation(prog, 'u_freq');
const uPhase = gl.getUniformLocation(prog, 'u_phase');

// Retune the wave frequencies every 30s so the plasma never settles into a
// repeating loop — it keeps evolving the whole time the screensaver runs.
let freq = [6, 5, 8, 9];
let nextFreq = [7, 4, 6, 11];
let phase = [0, 0, 0, 0];
let nextPhase = [0.7, 1.4, 2.1, 2.8];
const RETUNE = 30;
let lastTune = 0;

const start = performance.now();
function frame(now) {
  const t = (now - start) / 1000;
  if (t - lastTune > RETUNE) {
    freq = nextFreq;
    phase = nextPhase;
    nextFreq = [4 + Math.random() * 8, 4 + Math.random() * 8, 5 + Math.random() * 8, 5 + Math.random() * 10];
    nextPhase = [Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28];
    lastTune = t;
  }
  const b = Math.min(1, (t - lastTune) / 10);
  const eased = b * b * (3 - 2 * b);
  const mixedFreq = freq.map((v, i) => v * (1 - eased) + nextFreq[i] * eased);
  const mixedPhase = phase.map((v, i) => v * (1 - eased) + nextPhase[i] * eased);

  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform4f(uFreq, mixedFreq[0], mixedFreq[1], mixedFreq[2], mixedFreq[3]);
  gl.uniform4f(uPhase, mixedPhase[0], mixedPhase[1], mixedPhase[2], mixedPhase[3]);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
