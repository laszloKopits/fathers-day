<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Harmonic Loom</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #05050a; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Harmonic Loom — a slow moire textile made from hundreds of translucent
// harmonic threads. Three thread families are drawn through a time-varying
// displacement field; tiny changes in frequency, phase, and lensing make them
// bunch into knots, open into gauze, and shear past one another over many
// minutes. The drawing surface fades instead of clearing, and the whole loom
// drifts, rotates, and breathes to avoid fixed high-contrast pixels.

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const trail = document.createElement('canvas');
const tctx = trail.getContext('2d', { alpha: true });

let W = 1, H = 1, DPR = 1;
let frame = 0;
const TAU = Math.PI * 2;
const BG = [5, 5, 10];

const moods = [
  [[7, 10, 19], [54, 117, 142], [154, 211, 188], [246, 239, 191]],
  [[12, 8, 20], [88, 56, 132], [203, 111, 171], [252, 220, 183]],
  [[6, 17, 18], [38, 113, 91], [142, 198, 105], [238, 231, 169]],
  [[20, 11, 13], [122, 58, 58], [222, 128, 84], [255, 221, 150]]
];

function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
function fract(x) { return x - Math.floor(x); }
function smoothstep(a, b, x) {
  const k = clamp((x - a) / (b - a), 0, 1);
  return k * k * (3 - 2 * k);
}
function mix(a, b, k) { return a + (b - a) * k; }
function mixColor(a, b, k) {
  return [mix(a[0], b[0], k), mix(a[1], b[1], k), mix(a[2], b[2], k)];
}
function ramp(r, u) {
  const x = clamp(u, 0, 1) * 3;
  const i = Math.min(2, Math.floor(x));
  return mixColor(r[i], r[i + 1], x - i);
}
function palette(u, t, alpha) {
  const phase = t / 940;
  const i = Math.floor(phase) % moods.length;
  const k = smoothstep(0, 1, fract(phase));
  const a = ramp(moods[i], u);
  const b = ramp(moods[(i + 1) % moods.length], u);
  const c = mixColor(a, b, k);
  return `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${alpha})`;
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.max(1, Math.floor(innerWidth * DPR));
  H = Math.max(1, Math.floor(innerHeight * DPR));
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  trail.width = W;
  trail.height = H;
  tctx.fillStyle = `rgb(${BG[0]},${BG[1]},${BG[2]})`;
  tctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

function warp(x, y, t) {
  const r = Math.hypot(x, y);
  const a = Math.atan2(y, x);
  const lens1 = Math.sin(3.0 * a + r * (2.2 + 0.24 * Math.sin(t * 0.031)) - t * 0.37);
  const lens2 = Math.sin(x * 2.7 - y * 1.9 + t * 0.19 + Math.sin(t * 0.017) * 2.0);
  const lens3 = Math.sin((x + y) * 4.1 + r * 1.2 - t * 0.23);
  const s = 0.030 * lens1 + 0.022 * lens2 + 0.014 * lens3;
  return [
    x + Math.cos(a + TAU * 0.25) * s + 0.015 * Math.sin(y * 5.0 + t * 0.11),
    y + Math.sin(a + TAU * 0.25) * s + 0.015 * Math.sin(x * 4.3 - t * 0.13)
  ];
}

function pointFor(family, lane, u, t) {
  const aspect = W / Math.max(H, 1);
  const span = 2.65;
  let x, y;
  if (family === 0) {
    x = mix(-span * aspect, span * aspect, u);
    y = lane;
  } else if (family === 1) {
    x = lane * aspect;
    y = mix(-span, span, u);
  } else {
    const d = mix(-span, span, u);
    x = (d + lane * 0.92) * aspect * 0.72;
    y = (d - lane * 0.92) * 0.72;
  }

  const slow = t * (0.025 + family * 0.006);
  const bend =
    0.090 * Math.sin((u * 5.0 + lane * 1.7) * TAU + slow) +
    0.050 * Math.sin((u * 9.0 - lane * 2.3) * TAU - t * (0.037 + family * 0.004)) +
    0.028 * Math.sin((u * 15.0 + lane * 0.9) * TAU + t * 0.021);

  if (family === 0) y += bend;
  else if (family === 1) x += bend * aspect;
  else { x += bend * aspect * 0.65; y -= bend * 0.65; }

  const w = warp(x, y, t);
  return [w[0], w[1]];
}

function drawFamily(family, t) {
  const count = family === 2 ? 116 : 132;
  const steps = 88;
  const laneSpan = family === 2 ? 2.15 : 1.62;
  const aspect = W / Math.max(H, 1);
  const scale = Math.min(W / (2.75 * aspect), H / 2.75);
  const width = Math.max(0.42, DPR * (family === 2 ? 0.52 : 0.64));

  tctx.lineWidth = width;
  tctx.lineCap = 'round';
  tctx.lineJoin = 'round';

  for (let i = 0; i < count; i++) {
    const laneBase = mix(-laneSpan, laneSpan, (i + 0.5) / count);
    const lane = laneBase + 0.035 * Math.sin(t * (0.019 + family * 0.003) + i * 0.17);
    const hue = fract(i / count + family * 0.23 + 0.045 * Math.sin(t * 0.027 + i * 0.061));
    const breath = 0.45 + 0.55 * Math.sin(t * 0.041 + i * 0.29 + family);
    tctx.strokeStyle = palette(hue, t, 0.035 + 0.030 * breath);

    tctx.beginPath();
    for (let s = 0; s <= steps; s++) {
      const u = s / steps;
      const p = pointFor(family, lane, u, t);
      const px = W * 0.5 + p[0] * scale;
      const py = H * 0.5 + p[1] * scale;
      if (s === 0) tctx.moveTo(px, py);
      else tctx.lineTo(px, py);
    }
    tctx.stroke();
  }
}

function render(now) {
  frame++;
  const t = now * 0.001;

  tctx.globalCompositeOperation = 'source-over';
  tctx.fillStyle = 'rgba(5,5,10,0.105)';
  tctx.fillRect(0, 0, W, H);

  tctx.save();
  const dx = W * (0.020 * Math.sin(t * 0.017) + 0.012 * Math.sin(t * 0.009 + 1.7));
  const dy = H * (0.018 * Math.sin(t * 0.015 + 2.1));
  const rot = 0.035 * Math.sin(t * 0.011) + 0.018 * Math.sin(t * 0.007 + 0.8);
  const sc = 1.015 + 0.022 * Math.sin(t * 0.013 + 1.1);
  tctx.translate(W * 0.5 + dx, H * 0.5 + dy);
  tctx.rotate(rot);
  tctx.scale(sc, sc);
  tctx.translate(-W * 0.5, -H * 0.5);
  tctx.globalCompositeOperation = 'lighter';
  drawFamily(0, t);
  drawFamily(1, t + 17.0);
  drawFamily(2, t + 41.0);
  tctx.restore();

  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgb(${BG[0]},${BG[1]},${BG[2]})`;
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(trail, 0, 0);

  const g = ctx.createRadialGradient(W * 0.5, H * 0.5, Math.min(W, H) * 0.20, W * 0.5, H * 0.5, Math.max(W, H) * 0.70);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.48)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
