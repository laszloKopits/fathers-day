<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phyllotaxis Tide</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #030509; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Phyllotaxis Tide -- a living Vogel spiral.
// Thousands of seed points are redrawn through a slowly retuned phyllotactic
// map: divergence angle, radial packing, wave shear, palette, camera drift and
// bloom all move on long incommensurate periods. The surface fades rather than
// clears, so the seed lattice leaves soft tidal wakes while the whole flower
// wanders across the display for burn-in safety.
(function () {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });
  const TAU = Math.PI * 2;
  const GOLDEN = Math.PI * (3 - Math.sqrt(5));
  const params = new URLSearchParams(location.search);
  const T0 = parseFloat(params.get("t") || "0") || 0;

  let W = 1, H = 1, DPR = 1, S = 1, CX = 0, CY = 0;
  let stars = [];

  const moods = [
    { bg: [3, 6, 10], a: [65, 190, 210], b: [174, 112, 226], c: [241, 201, 116] },
    { bg: [8, 5, 13], a: [221, 104, 166], b: [106, 184, 226], c: [242, 174, 91] },
    { bg: [5, 9, 7], a: [104, 204, 142], b: [211, 224, 135], c: [88, 170, 198] },
    { bg: [10, 6, 5], a: [239, 149, 91], b: [194, 87, 132], c: [245, 218, 153] }
  ];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.max(1, Math.floor(innerWidth * DPR));
    H = Math.max(1, Math.floor(innerHeight * DPR));
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    S = Math.min(W, H);
    CX = W * 0.5;
    CY = H * 0.5;
    makeStars();
    ctx.fillStyle = "rgb(3,6,10)";
    ctx.fillRect(0, 0, W, H);
  }

  function makeStars() {
    const n = Math.floor(Math.max(70, Math.min(170, W * H / 26000)));
    stars = new Array(n);
    let seed = 0x6d2b79f5;
    function rand() {
      seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
      return ((seed >>> 0) / 4294967296);
    }
    for (let i = 0; i < n; i++) {
      stars[i] = {
        x: rand() * W,
        y: rand() * H,
        r: (0.25 + rand() * 1.1) * DPR,
        p: rand() * TAU,
        a: 0.05 + rand() * 0.18
      };
    }
  }

  function lfo(t, period, phase) {
    return Math.sin(TAU * (t / period + phase));
  }

  function smooth(x) {
    x = Math.max(0, Math.min(1, x));
    return x * x * (3 - 2 * x);
  }

  function mix(a, b, f) {
    return a + (b - a) * f;
  }

  function palette(t, u) {
    const cyc = (t / 1017) % moods.length;
    const i0 = Math.floor(cyc);
    const i1 = (i0 + 1) % moods.length;
    const f = smooth(cyc - i0);
    const m0 = moods[i0], m1 = moods[i1];
    const w1 = 0.50 + 0.50 * Math.sin(TAU * (u + 0.06 * Math.sin(t / 67)));
    const w2 = 0.50 + 0.50 * Math.sin(TAU * (u * 1.73 + 0.22 + 0.04 * Math.cos(t / 83)));
    const ca = [
      mix(m0.a[0], m1.a[0], f), mix(m0.a[1], m1.a[1], f), mix(m0.a[2], m1.a[2], f)
    ];
    const cb = [
      mix(m0.b[0], m1.b[0], f), mix(m0.b[1], m1.b[1], f), mix(m0.b[2], m1.b[2], f)
    ];
    const cc = [
      mix(m0.c[0], m1.c[0], f), mix(m0.c[1], m1.c[1], f), mix(m0.c[2], m1.c[2], f)
    ];
    return [
      ca[0] * (1 - w1) + cb[0] * w1 * 0.78 + cc[0] * w2 * 0.32,
      ca[1] * (1 - w1) + cb[1] * w1 * 0.78 + cc[1] * w2 * 0.32,
      ca[2] * (1 - w1) + cb[2] * w1 * 0.78 + cc[2] * w2 * 0.32
    ];
  }

  function backgroundColor(t) {
    const cyc = (t / 1017) % moods.length;
    const i0 = Math.floor(cyc);
    const i1 = (i0 + 1) % moods.length;
    const f = smooth(cyc - i0);
    const b0 = moods[i0].bg, b1 = moods[i1].bg;
    return [
      mix(b0[0], b1[0], f),
      mix(b0[1], b1[1], f),
      mix(b0[2], b1[2], f)
    ];
  }

  function drawVignette(t) {
    const bx = CX + S * 0.16 * lfo(t, 389, 0.17);
    const by = CY + S * 0.13 * lfo(t, 431, 0.62);
    const g = ctx.createRadialGradient(bx, by, S * 0.08, bx, by, S * 0.78);
    g.addColorStop(0, "rgba(255,255,255,0.030)");
    g.addColorStop(0.52, "rgba(0,0,0,0.00)");
    g.addColorStop(1, "rgba(0,0,0,0.40)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawStars(t) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      const driftX = S * 0.012 * Math.sin(t / 97 + s.p);
      const driftY = S * 0.010 * Math.cos(t / 131 + s.p * 1.7);
      const tw = s.a * (0.45 + 0.55 * Math.sin(t * 0.23 + s.p));
      ctx.fillStyle = "rgba(150,190,210," + tw.toFixed(3) + ")";
      ctx.beginPath();
      ctx.arc((s.x + driftX + W) % W, (s.y + driftY + H) % H, s.r, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }

  function render(now) {
    const t = T0 + now * 0.001;
    const bg = backgroundColor(t);
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(" + bg.map(v => v.toFixed(1)).join(",") + ",0.075)";
    ctx.fillRect(0, 0, W, H);
    drawStars(t);

    const count = Math.floor(5200 + 1300 * (0.5 + 0.5 * lfo(t, 743, 0.41)));
    const divergence = GOLDEN + 0.018 * lfo(t, 613, 0.13) + 0.006 * lfo(t, 907, 0.77);
    const pack = S * (0.0069 + 0.0012 * lfo(t, 811, 0.29));
    const maxR = S * (0.42 + 0.035 * lfo(t, 677, 0.52));
    const orbit = S * 0.105;
    const cx = CX + orbit * lfo(t, 557, 0.04) + S * 0.020 * Math.sin(t / 23);
    const cy = CY + orbit * lfo(t, 631, 0.39) + S * 0.020 * Math.cos(t / 29);
    const rot = 0.21 * lfo(t, 881, 0.2) + t * 0.010;
    const shear = 0.18 * lfo(t, 719, 0.66);
    const aspectX = 1.0 + 0.10 * lfo(t, 997, 0.31);
    const aspectY = 1.0 - 0.08 * lfo(t, 1069, 0.83);
    const waveA = S * (0.010 + 0.010 * (0.5 + 0.5 * lfo(t, 563, 0.11)));
    const waveB = S * (0.006 + 0.008 * (0.5 + 0.5 * lfo(t, 701, 0.48)));

    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.scale(aspectX, aspectY);

    for (let i = 10; i < count; i++) {
      const n = i + 0.35 * Math.sin(t * 0.37 + i * 0.011);
      const u = i / count;
      const base = Math.sqrt(n) * pack;
      const rNorm = base / maxR;
      if (rNorm > 1.22) continue;
      let a = n * divergence;
      a += 0.15 * Math.sin(t * 0.049 + rNorm * 10.5);
      a += 0.08 * Math.sin(t * 0.031 + n * 0.017);
      let x = Math.cos(a) * base;
      let y = Math.sin(a) * base;
      const strand = Math.sin(11.0 * a + t * 0.11) * Math.sin(rNorm * 18.0 - t * 0.07);
      const tide = Math.sin(x * 0.010 + y * 0.006 + t * 0.22);
      x += (strand * waveA + tide * waveB) * (0.35 + rNorm);
      y += Math.sin(x * 0.007 - t * 0.18) * waveB * (0.45 + 0.7 * rNorm);
      x += shear * y * (0.25 + 0.55 * rNorm);
      const petal = 0.5 + 0.5 * Math.sin(17 * a + t * 0.065 + 5 * rNorm);
      const fade = smooth(1.15 - rNorm) * smooth((i - 10) / 120);
      const pulse = 0.48 + 0.52 * Math.sin(t * 0.31 + i * 0.021 + petal * 1.8);
      const col = palette(t, u * 0.72 + petal * 0.20 + rNorm * 0.36);
      const alpha = fade * (0.045 + 0.13 * petal) * (0.65 + 0.35 * pulse);
      const size = DPR * (0.36 + 1.75 * fade * (1 - 0.55 * rNorm) + 1.1 * petal * (1 - u));
      ctx.fillStyle = "rgba(" + col.map(v => Math.max(0, Math.min(255, v)).toFixed(0)).join(",") + "," + alpha.toFixed(4) + ")";
      ctx.beginPath();
      ctx.arc(x, y, size, 0, TAU);
      ctx.fill();

      if (i % 9 === 0 && petal > 0.72 && rNorm < 0.98) {
        const glow = size * (2.4 + 2.2 * petal);
        ctx.fillStyle = "rgba(" + col.map(v => Math.min(255, v + 32).toFixed(0)).join(",") + "," + (alpha * 0.09).toFixed(4) + ")";
        ctx.beginPath();
        ctx.arc(x, y, glow, 0, TAU);
        ctx.fill();
      }
    }

    ctx.restore();
    drawVignette(t);
    requestAnimationFrame(render);
  }

  addEventListener("resize", resize);
  resize();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
