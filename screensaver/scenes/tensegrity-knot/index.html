<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tensegrity Knot</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #030407; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Tensegrity Knot -- a slow 3D elastic sculpture.
// Several offset torus-knot strands carry luminous beads while short spring
// chords connect near neighbours across the bundle. The knot order, tube radius,
// twist, camera, palette, and drawing origin drift on long incommensurate
// periods, so the structure breathes between cage, chrysalis, and woven-orbit
// states without snapping into an obvious loop. The canvas fades rather than
// clears, leaving soft afterimages while the whole sculpture wanders for
// burn-in safety.
(function () {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });
  const TAU = Math.PI * 2;
  const points = [];
  const projected = [];
  const stars = [];

  let W = 1, H = 1, DPR = 1, S = 1, CX = 0, CY = 0;
  let bg = [3, 4, 7];

  const moods = [
    { bg: [3, 5, 8], a: [61, 205, 186], b: [124, 142, 232], c: [244, 217, 151] },
    { bg: [8, 4, 10], a: [216, 91, 158], b: [101, 190, 225], c: [245, 188, 116] },
    { bg: [4, 9, 8], a: [102, 203, 132], b: [193, 221, 140], c: [104, 174, 218] },
    { bg: [10, 6, 5], a: [235, 135, 88], b: [164, 91, 198], c: [248, 226, 168] }
  ];

  function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
  function mix(a, b, f) { return a + (b - a) * f; }
  function smooth(x) {
    x = clamp(x, 0, 1);
    return x * x * (3 - 2 * x);
  }
  function lfo(t, period, phase) {
    return Math.sin(TAU * (t / period + phase));
  }
  function colorMix(a, b, f) {
    return [mix(a[0], b[0], f), mix(a[1], b[1], f), mix(a[2], b[2], f)];
  }
  function moodAt(t) {
    const p = (t / 1021) % moods.length;
    const i = Math.floor(p);
    const f = smooth(p - i);
    const m0 = moods[i];
    const m1 = moods[(i + 1) % moods.length];
    return {
      bg: colorMix(m0.bg, m1.bg, f),
      a: colorMix(m0.a, m1.a, f),
      b: colorMix(m0.b, m1.b, f),
      c: colorMix(m0.c, m1.c, f)
    };
  }
  function palette(m, u, lift) {
    const w1 = 0.5 + 0.5 * Math.sin(TAU * (u + lift));
    const w2 = 0.5 + 0.5 * Math.sin(TAU * (u * 1.73 + 0.21 - lift * 0.7));
    return [
      m.a[0] * (1 - w1) + m.b[0] * w1 * 0.82 + m.c[0] * w2 * 0.30,
      m.a[1] * (1 - w1) + m.b[1] * w1 * 0.82 + m.c[1] * w2 * 0.30,
      m.a[2] * (1 - w1) + m.b[2] * w1 * 0.82 + m.c[2] * w2 * 0.30
    ];
  }
  function rgba(col, a) {
    return "rgba(" +
      clamp(col[0], 0, 255).toFixed(0) + "," +
      clamp(col[1], 0, 255).toFixed(0) + "," +
      clamp(col[2], 0, 255).toFixed(0) + "," + a.toFixed(4) + ")";
  }

  function rand(seed) {
    let x = seed | 0;
    return function () {
      x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
      return (x >>> 0) / 4294967296;
    };
  }

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.max(1, Math.floor(innerWidth * DPR));
    H = Math.max(1, Math.floor(innerHeight * DPR));
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    S = Math.min(W, H);
    CX = W * 0.5;
    CY = H * 0.5;
    makeStars();
    ctx.fillStyle = "rgb(" + bg.join(",") + ")";
    ctx.fillRect(0, 0, W, H);
  }

  function makeStars() {
    stars.length = 0;
    const r = rand(0x9e3779b9);
    const n = Math.floor(clamp(W * H / 24000, 80, 230));
    for (let i = 0; i < n; i++) {
      stars.push({
        x: r() * W,
        y: r() * H,
        z: 0.35 + r() * 0.65,
        s: (0.25 + r() * 1.25) * DPR,
        p: r() * TAU,
        a: 0.035 + r() * 0.13
      });
    }
  }

  function rotate(p, ax, ay, az) {
    let x = p.x, y = p.y, z = p.z;
    let c = Math.cos(ax), s = Math.sin(ax);
    let y1 = y * c - z * s, z1 = y * s + z * c;
    y = y1; z = z1;
    c = Math.cos(ay); s = Math.sin(ay);
    let x1 = x * c + z * s; z1 = -x * s + z * c;
    x = x1; z = z1;
    c = Math.cos(az); s = Math.sin(az);
    x1 = x * c - y * s; y1 = x * s + y * c;
    return { x: x1, y: y1, z: z };
  }

  function knotPoint(u, strand, t) {
    const th = u * TAU;
    const p = 2.0 + 0.28 * lfo(t, 829, 0.08) + 0.11 * Math.sin(t * 0.009 + strand);
    const q = 3.0 + 0.36 * lfo(t, 947, 0.31) - 0.09 * Math.cos(t * 0.007 + strand * 1.7);
    const tube = 0.40 + 0.09 * lfo(t, 701, 0.62);
    const major = 1.36 + 0.13 * lfo(t, 1193, 0.19);
    const phase = strand * TAU / 7 + 0.42 * Math.sin(t * 0.017 + strand * 0.8);
    const braid = Math.sin(th * (5.0 + 0.25 * lfo(t, 613, 0.4)) + phase + t * 0.037);
    const r = major + tube * Math.cos(q * th + phase) + 0.045 * braid;
    const x = r * Math.cos(p * th);
    const y = r * Math.sin(p * th);
    const z = tube * Math.sin(q * th + phase) + 0.25 * Math.sin(th * 2.0 - t * 0.031 + strand);
    const nx = Math.cos(p * th + Math.PI * 0.5);
    const ny = Math.sin(p * th + Math.PI * 0.5);
    const side = (strand - 3) * 0.025 + 0.035 * Math.sin(th * 7.0 + t * 0.021 + strand);
    return { x: x + nx * side, y: y + ny * side, z: z + side * 1.7 };
  }

  function buildGeometry(t) {
    points.length = 0;
    projected.length = 0;
    const strands = 7;
    const per = 88;
    const ax = 0.72 + 0.38 * lfo(t, 761, 0.17) + t * 0.008;
    const ay = 0.44 * lfo(t, 887, 0.43) + t * 0.010;
    const az = 0.25 * lfo(t, 991, 0.72) - t * 0.006;
    const scale = S * (0.235 + 0.020 * lfo(t, 1069, 0.51));
    const ox = CX + S * (0.105 * lfo(t, 577, 0.12) + 0.024 * Math.sin(t / 31));
    const oy = CY + S * (0.085 * lfo(t, 641, 0.58) + 0.020 * Math.cos(t / 37));
    const zoom = 4.15 + 0.34 * lfo(t, 953, 0.27);

    for (let s = 0; s < strands; s++) {
      for (let i = 0; i < per; i++) {
        const u = (i + 0.18 * Math.sin(t * 0.019 + s)) / per;
        const p = rotate(knotPoint(u, s, t), ax, ay, az);
        const depth = zoom / (zoom - p.z);
        const x = ox + p.x * scale * depth;
        const y = oy + p.y * scale * depth;
        const idx = points.length;
        points.push({ x: p.x, y: p.y, z: p.z, u: u, strand: s, i: i });
        projected.push({ x: x, y: y, z: p.z, depth: depth, idx: idx });
      }
    }
  }

  function drawStars(t, m) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      const x = (s.x + S * 0.015 * Math.sin(t / 109 + s.p) + W) % W;
      const y = (s.y + S * 0.013 * Math.cos(t / 127 + s.p * 1.9) + H) % H;
      const tw = s.a * (0.55 + 0.45 * Math.sin(t * 0.21 + s.p));
      ctx.fillStyle = rgba(colorMix(m.a, m.b, s.z), tw);
      ctx.beginPath();
      ctx.arc(x, y, s.s, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawEdges(t, m) {
    const per = 88;
    const chords = [1, 9, 17, 31];
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    for (let a = 0; a < projected.length; a++) {
      const pa = points[a];
      const va = projected[a];
      for (let k = 0; k < chords.length; k++) {
        const off = chords[k];
        const targetStrand = (pa.strand + (k === 0 ? 0 : k + 1)) % 7;
        const targetI = (pa.i + off + Math.floor(2.5 * Math.sin(t * 0.013 + k))) % per;
        const b = targetStrand * per + targetI;
        if (b <= a && k !== 0) continue;
        const vb = projected[b];
        const pb = points[b];
        const dx = va.x - vb.x, dy = va.y - vb.y;
        const screenD = Math.hypot(dx, dy) / S;
        if (screenD > 0.38) continue;
        const midz = (va.z + vb.z) * 0.5;
        const front = clamp((midz + 1.2) / 2.8, 0, 1);
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.073 + pa.i * 0.19 + pa.strand * 0.7 + k);
        const alpha = (k === 0 ? 0.070 : 0.034) * (0.35 + 0.65 * front) * (0.65 + 0.35 * pulse) * (1.0 - clamp(screenD * 1.8, 0, 0.72));
        const col = palette(m, pa.u * 0.62 + pb.u * 0.27 + k * 0.13, t * 0.004);
        ctx.strokeStyle = rgba(col, alpha);
        ctx.lineWidth = DPR * (k === 0 ? 0.96 : 0.50) * (0.75 + 0.55 * front);
        ctx.beginPath();
        ctx.moveTo(va.x, va.y);
        const sag = S * 0.018 * Math.sin((pa.u + pb.u) * TAU * 2.0 + t * 0.043 + k);
        ctx.quadraticCurveTo((va.x + vb.x) * 0.5 + sag, (va.y + vb.y) * 0.5 - sag * 0.6, vb.x, vb.y);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawBeads(t, m) {
    const order = projected.slice().sort((a, b) => a.z - b.z);
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let n = 0; n < order.length; n++) {
      const v = order[n];
      const p = points[v.idx];
      const front = clamp((v.z + 1.35) / 2.9, 0, 1);
      const beat = 0.5 + 0.5 * Math.sin(t * 0.17 + p.i * 0.31 + p.strand * 0.9);
      const r = DPR * (0.42 + 1.20 * v.depth * (0.45 + 0.55 * front)) * (0.78 + 0.28 * beat);
      const col = palette(m, p.u + p.strand * 0.071, t * 0.006 + front * 0.2);
      ctx.fillStyle = rgba(col, 0.014 + 0.040 * front);
      ctx.beginPath();
      ctx.arc(v.x, v.y, r * 3.2, 0, TAU);
      ctx.fill();
      ctx.fillStyle = rgba([col[0] + 12, col[1] + 14, col[2] + 18], 0.060 + 0.155 * front);
      ctx.beginPath();
      ctx.arc(v.x, v.y, r, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }

  function vignette(t) {
    const x = CX + S * 0.12 * lfo(t, 431, 0.29);
    const y = CY + S * 0.11 * lfo(t, 509, 0.76);
    const g = ctx.createRadialGradient(x, y, S * 0.12, x, y, S * 0.86);
    g.addColorStop(0, "rgba(255,255,255,0.020)");
    g.addColorStop(0.58, "rgba(0,0,0,0.00)");
    g.addColorStop(1, "rgba(0,0,0,0.56)");
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function render(now) {
    const t = now * 0.001;
    const m = moodAt(t);
    bg = m.bg.map(v => v | 0);

    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(" + bg.join(",") + ",0.072)";
    ctx.fillRect(0, 0, W, H);

    drawStars(t, m);
    buildGeometry(t);
    drawEdges(t, m);
    drawBeads(t, m);
    vignette(t);

    requestAnimationFrame(render);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(render);
}());
</script>
</body>
</html>
