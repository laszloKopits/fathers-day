<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Platooning Scene Explorer — Napkin Futurist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
  #canvas-container { width: 100vw; height: 100vh; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 20px; pointer-events: none; z-index: 10;
  }
  #scene-info {
    background: rgba(26,26,46,0.9); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 16px 20px; max-width: 400px;
    pointer-events: auto; backdrop-filter: blur(10px);
  }
  #scene-info h2 { font-size: 18px; color: #2DD4BF; margin-bottom: 4px; }
  #scene-info p { font-size: 13px; color: #aaa; line-height: 1.4; }
  #scene-info .scene-num { font-size: 11px; color: #666; margin-top: 8px; }
  #scene-list {
    background: rgba(26,26,46,0.9); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 12px; pointer-events: auto;
    backdrop-filter: blur(10px); max-width: 280px;
  }
  #scene-list button {
    display: block; width: 100%; text-align: left;
    background: transparent; border: 1px solid transparent;
    color: #ccc; padding: 8px 12px; border-radius: 8px;
    font-size: 13px; cursor: pointer; margin-bottom: 2px; transition: all 0.2s;
  }
  #scene-list button:hover { background: rgba(45,212,191,0.1); border-color: rgba(45,212,191,0.3); }
  #scene-list button.active { background: rgba(45,212,191,0.15); border-color: #2DD4BF; color: #2DD4BF; }
  #controls-hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: #666; pointer-events: none;
  }
  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 14px; color: #2DD4BF; display: none; z-index: 100;
  }
  #overlay-labels { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
  /* lil-gui overrides */
  .lil-gui { --background-color: rgba(26,26,46,0.95) !important; --widget-color: #2DD4BF30 !important; --focus-color: #2DD4BF !important; --number-color: #2DD4BF !important; --string-color: #e0e0e0 !important; }
  .lil-gui .title { color: #2DD4BF !important; }
  #export-btn {
    position: fixed; bottom: 20px; right: 20px;
    background: #2DD4BF; color: #1a1a2e; border: none; padding: 8px 16px;
    border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; z-index: 20;
  }
  #export-btn:hover { background: #5eead4; }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="overlay-labels"></div>

<div id="ui">
  <div id="scene-info">
    <h2 id="scene-title"></h2>
    <p id="scene-desc"></p>
    <div class="scene-num" id="scene-counter"></div>
  </div>
  <div id="scene-list"></div>
</div>

<div id="controls-hint">← → to switch scenes · scroll to zoom · drag to orbit · G to toggle GUI</div>
<div id="loading">Loading assets...</div>
<button id="export-btn" onclick="exportParams()">📋 Export Params</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/",
    "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import GUI from 'lil-gui';

/* ═══════════════════ ASSET PATHS ═══════════════════ */
const PATHS = {
  car:        'assets/car-kit/Models/GLB format/',
  road:       'assets/city-kit-roads/Models/GLB format/',
  commercial: 'assets/city-kit-commercial/Models/GLB format/',
  suburban:   'assets/city-kit-suburban/Models/GLB format/',
  nature:     'assets/nature-kit/Models/GLTF format/',
};

/* ═══════════════════ PARAMETRIC CONFIG ═══════════════════ */
const params = {
  // Global
  buildingScale: 2.5,
  buildingSpacing: 12,
  buildingCountMultiplier: 1.0,
  buildingSetback: 16,        // distance from road center to buildings
  buildingBaseRot: 0,          // base rotation offset (radians) — Kenney models face +Z by default
  buildingRotJitter: 0.1,     // random rotation jitter (radians)
  treeScale: 2.0,
  treeCountMultiplier: 1.0,
  treePlacementJitter: 2.0,
  treeSetback: 8,             // distance from road center to street trees

  // Pods
  podScale: 0.75,
  podGap: 2.5,
  podSpeed: 2.5,
  podCount: 16,

  // Cars
  carScale: 1.0,
  carSpacing: 11,

  // Road
  roadWidth: 14,
  laneGlowOpacity: 0.18,
  laneGlowIntensity: 1.8,
  sidewalkWidth: 2.5,
  sidewalkSetback: 4.5,       // distance from road center to sidewalk

  // Suburban
  houseScale: 2.0,
  houseSpacing: 9,
  houseSetback: 12,           // distance from road center to houses
  houseBaseRot: 0,             // base rotation offset for houses — Kenney models face +Z by default
  houseRotJitter: 0.05,
  fenceSetback: 7,
  drivewaySetback: 7,

  // Environment
  fogDensity: 0.004,
  sunIntensity: 1.6,
  ambientIntensity: 0.5,
  groundSize: 300,

  // Scene 3 grid
  gridSize: 3,
  blockSize: 16,

  // Scale comparison
  humanLaneCarCount: 6,
  humanLaneCarSpacing: 11,
  podLanePodCount: 28,
  podLanePodGap: 2.2,

  // SF Map (Haight-Ashbury)
  sfBuildingOpacity: 1.0,
  sfBuildingScale: 1.0,
  sfRoadWidth: 1.0,
  sfShowFootways: true,
  sfShowBuildings: true,
};

/* ═══════════════════ COLORS ═══════════════════ */
const POD_TEAL    = 0x2DD4BF;
const GROUND_COL  = 0xD4D4AA;
const LANE_ACCENT = 0x14B8A6;
const SKY_COL     = 0xF0F9FF;
const WARM_LIGHT  = 0xFFF7ED;

/* ═══════════════════ ENGINE ═══════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY_COL);
scene.fog = new THREE.FogExp2(SKY_COL, params.fogDensity);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(30, 25, 30);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, params.ambientIntensity);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(WARM_LIGHT, params.sunIntensity);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -80;
sunLight.shadow.camera.right = 80;
sunLight.shadow.camera.top = 80;
sunLight.shadow.camera.bottom = -80;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 200;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x88aacc, 0.3);
fillLight.position.set(-20, 15, -10);
scene.add(fillLight);

/* ═══════════════════ ASSET LOADER ═══════════════════ */
const gltfLoader = new GLTFLoader();
const modelCache = {};

async function loadModel(pack, name) {
  const key = `${pack}/${name}`;
  if (modelCache[key]) return modelCache[key].clone();

  const prefix = PATHS[pack];
  if (!prefix) { console.warn(`Unknown pack: ${pack}`); return makeFallbackBox(pack); }

  const url = prefix + name + '.glb';
  try {
    const gltf = await new Promise((resolve, reject) => {
      gltfLoader.load(url, resolve, undefined, reject);
    });
    const model = gltf.scene;
    model.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    modelCache[key] = model;
    return model.clone();
  } catch (e) {
    console.warn(`Failed to load ${url}, using fallback`);
    return makeFallbackBox(pack);
  }
}

function makeFallbackBox(pack) {
  const colors = { car: 0x888899, road: 0x555566, commercial: 0x997788, suburban: 0x889977, nature: 0x558855 };
  const sizes = { car: [1.8, 1.2, 4], road: [8, 0.15, 8], commercial: [4, 8, 4], suburban: [3, 4, 3], nature: [1, 3, 1] };
  const s = sizes[pack] || [2, 2, 2];
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(s[0], s[1], s[2]),
    new THREE.MeshStandardMaterial({ color: colors[pack] || 0x888888, roughness: 0.7 })
  );
  mesh.position.y = s[1] / 2;
  mesh.castShadow = true;
  const g = new THREE.Group();
  g.add(mesh);
  return g;
}

/* ═══════════════════ HELPERS ═══════════════════ */
const sceneGroup = new THREE.Group();
scene.add(sceneGroup);

let animationCallbacks = [];
let overlayLabels = [];

function clearScene() {
  while (sceneGroup.children.length) {
    const c = sceneGroup.children[0];
    sceneGroup.remove(c);
    c.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
        else o.material.dispose();
      }
    });
  }
  animationCallbacks = [];
  document.getElementById('overlay-labels').innerHTML = '';
  overlayLabels = [];
}

function addGround(color = GROUND_COL) {
  const g = new THREE.Mesh(
    new THREE.PlaneGeometry(params.groundSize, params.groundSize),
    new THREE.MeshStandardMaterial({ color })
  );
  g.rotation.x = -Math.PI / 2;
  g.position.y = -0.02;
  g.receiveShadow = true;
  sceneGroup.add(g);
}

function makePod(scaleOverride) {
  const scale = scaleOverride ?? params.podScale;
  const g = new THREE.Group();
  const w = 1.2 * scale, h = 0.9 * scale, l = 2.2 * scale;

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, l),
    new THREE.MeshStandardMaterial({ color: POD_TEAL, roughness: 0.25, metalness: 0.4 })
  );
  body.position.y = h / 2 + 0.15 * scale;
  body.castShadow = true;
  g.add(body);

  const win = new THREE.Mesh(
    new THREE.BoxGeometry(w * 0.96, h * 0.35, l * 0.8),
    new THREE.MeshStandardMaterial({ color: 0x88ddff, roughness: 0.05, metalness: 0.9, transparent: true, opacity: 0.5 })
  );
  win.position.y = h * 0.78 + 0.15 * scale;
  g.add(win);

  const wheelGeo = new THREE.CylinderGeometry(0.17 * scale, 0.17 * scale, 0.08 * scale, 12);
  wheelGeo.rotateZ(Math.PI / 2);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  [[-w/2 - 0.04, 0.17*scale, l*0.32], [w/2 + 0.04, 0.17*scale, l*0.32],
   [-w/2 - 0.04, 0.17*scale, -l*0.32], [w/2 + 0.04, 0.17*scale, -l*0.32]].forEach(pos => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.position.set(...pos);
    g.add(wheel);
  });

  const led = new THREE.Mesh(
    new THREE.BoxGeometry(w * 0.7, 0.04 * scale, 0.04 * scale),
    new THREE.MeshStandardMaterial({ color: POD_TEAL, emissive: POD_TEAL, emissiveIntensity: 2.5 })
  );
  led.position.set(0, h * 0.4 + 0.15 * scale, l / 2 + 0.02);
  g.add(led);

  const ledR = led.clone();
  ledR.material = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff4444, emissiveIntensity: 1.5 });
  ledR.position.z = -l / 2 - 0.02;
  g.add(ledR);

  return g;
}

function makeRoadSegment(width, length) {
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(width, length),
    new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.9 })
  );
  road.rotation.x = -Math.PI / 2;
  road.position.y = 0.005;
  road.receiveShadow = true;
  return road;
}

function makeDashedLine(x, z, length, vertical, color = 0xffffff) {
  const g = new THREE.Group();
  const dashLen = 1.5, gapLen = 1.5;
  const count = Math.floor(length / (dashLen + gapLen));
  for (let i = 0; i < count; i++) {
    const dash = new THREE.Mesh(
      new THREE.PlaneGeometry(vertical ? 0.1 : dashLen, vertical ? dashLen : 0.1),
      new THREE.MeshStandardMaterial({ color })
    );
    dash.rotation.x = -Math.PI / 2;
    const offset = -length / 2 + i * (dashLen + gapLen) + dashLen / 2;
    dash.position.set(vertical ? x : x + offset, 0.02, vertical ? z + offset : z);
    g.add(dash);
  }
  return g;
}

function makeLaneGlow(x, z, length, vertical) {
  const g = new THREE.Group();
  const w = vertical ? 2.0 : length;
  const h = vertical ? length : 2.0;

  const fill = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshStandardMaterial({ color: LANE_ACCENT, transparent: true, opacity: params.laneGlowOpacity })
  );
  fill.rotation.x = -Math.PI / 2;
  fill.position.set(x, 0.015, z);
  g.add(fill);

  for (const off of [-1.0, 1.0]) {
    const edge = new THREE.Mesh(
      new THREE.PlaneGeometry(vertical ? 0.08 : length, vertical ? length : 0.08),
      new THREE.MeshStandardMaterial({ color: LANE_ACCENT, emissive: LANE_ACCENT, emissiveIntensity: params.laneGlowIntensity })
    );
    edge.rotation.x = -Math.PI / 2;
    edge.position.set(vertical ? x + off : x, 0.025, vertical ? z : z + off);
    g.add(edge);
  }
  return g;
}

function makeFallbackTree() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.18, 1.5, 6),
    new THREE.MeshStandardMaterial({ color: 0x8B6914 })
  );
  trunk.position.y = 0.75;
  trunk.castShadow = true;
  g.add(trunk);
  const canopy = new THREE.Mesh(
    new THREE.SphereGeometry(1.1, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x4a9a4a, roughness: 0.85 })
  );
  canopy.position.y = 2.3;
  canopy.castShadow = true;
  g.add(canopy);
  return g;
}

async function loadTree(variant) {
  const treeNames = {
    nature_pine: 'tree_pineRoundB',
    nature_tall: 'tree_tall_dark',
    nature_palm: 'tree_palmDetailedShort',
    nature_oak: 'tree_oak',
  };

  let t;
  if (variant === 'suburban_large') {
    t = await loadModel('suburban', 'tree-large');
  } else if (variant === 'suburban_small') {
    t = await loadModel('suburban', 'tree-small');
  } else {
    const name = treeNames[variant] || 'tree_pineRoundB';
    t = await loadModel('nature', name);
  }
  t = t || makeFallbackTree();
  t.scale.setScalar(params.treeScale);
  return t;
}

function makeLabel3D(text, x, y, z, color) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1024;
  canvas.height = 256;
  const lines = text.split('\n');
  const col = new THREE.Color(color);
  const cs = `rgb(${col.r * 255 | 0},${col.g * 255 | 0},${col.b * 255 | 0})`;
  ctx.textAlign = 'center';
  lines.forEach((line, i) => {
    ctx.font = i === 0 ? 'bold 36px Inter,system-ui,sans-serif' : '24px Inter,system-ui,sans-serif';
    ctx.fillStyle = i === 0 ? cs : '#cccccc';
    ctx.fillText(line, 512, 60 + i * 44);
  });
  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true })
  );
  sprite.position.set(x, y, z);
  sprite.scale.set(12, 3, 1);
  sceneGroup.add(sprite);
}

async function loadCarOrBox(name, tintColor) {
  let car = await loadModel('car', name);
  if (car) {
    car.scale.setScalar(params.carScale);
    if (tintColor !== undefined) {
      car.traverse(child => {
        if (child.isMesh && child.material) {
          child.material = child.material.clone();
          child.material.color.set(tintColor);
        }
      });
    }
    return car;
  }
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 1.0, 4.2),
    new THREE.MeshStandardMaterial({ color: tintColor || 0x888888, roughness: 0.5 })
  );
  box.position.y = 0.5;
  box.castShadow = true;
  const g = new THREE.Group();
  g.add(box);
  return g;
}

function makeSidewalk(x, z, w, l) {
  const sw = new THREE.Mesh(
    new THREE.BoxGeometry(w, 0.12, l),
    new THREE.MeshStandardMaterial({ color: 0xccccbb, roughness: 0.9 })
  );
  sw.position.set(x, 0.06, z);
  sw.receiveShadow = true;
  return sw;
}

// faceStreet: 'left' | 'right' | 'top' | 'bottom' | number (explicit radians) | null (use rotY)
// baseRot: model's base rotation offset — models may not have their "front" at 0 radians
// jitter: random ± rotation for natural look
function faceStreetRotation(faceStreet, baseRot = 0, jitter = 0) {
  const jit = (Math.random() - 0.5) * jitter * 2;
  if (faceStreet === 'right') return Math.PI / 2 + baseRot + jit;     // face +X
  if (faceStreet === 'left') return -Math.PI / 2 + baseRot + jit;     // face -X
  if (faceStreet === 'top') return 0 + baseRot + jit;                  // face +Z
  if (faceStreet === 'bottom') return Math.PI + baseRot + jit;         // face -Z
  if (typeof faceStreet === 'number') return faceStreet + baseRot + jit;
  return baseRot + jit;
}

async function placeBuilding(pack, name, x, z, faceStreet = null) {
  const b = await loadModel(pack, name);
  if (b) {
    b.scale.setScalar(params.buildingScale);
    b.position.set(x, 0, z);
    b.rotation.y = faceStreetRotation(faceStreet, params.buildingBaseRot, params.buildingRotJitter);
    sceneGroup.add(b);
  }
  return b;
}

async function placeHouse(name, x, z, faceStreet = null) {
  const h = await loadModel('suburban', name);
  if (h) {
    h.scale.setScalar(params.houseScale);
    h.position.set(x, 0, z);
    h.rotation.y = faceStreetRotation(faceStreet, params.houseBaseRot, params.houseRotJitter);
    sceneGroup.add(h);
  }
  return h;
}

/* ═══════════════════ SCENE DEFINITIONS ═══════════════════ */
const SCENES = [];

// ───────────── Scene 1: Pod Platoon vs Traffic ─────────────
SCENES.push({
  name: 'Pod Platoon vs Traffic',
  desc: 'A straight road with two lanes. Left: scattered normal traffic with large gaps. Right: a tight pod platoon formation. The throughput difference is visible at a glance.',
  setup: async () => {
    addGround();

    const roadLen = 80;
    const road = makeRoadSegment(params.roadWidth, roadLen);
    sceneGroup.add(road);

    // Road asset pieces
    for (let i = -3; i <= 3; i++) {
      const rs = await loadModel('road', 'road-straight');
      if (rs) { rs.position.set(0, 0, i * 8); sceneGroup.add(rs); }
    }

    // Center divider
    const cl = new THREE.Mesh(
      new THREE.PlaneGeometry(0.15, roadLen),
      new THREE.MeshStandardMaterial({ color: 0xddcc44 })
    );
    cl.rotation.x = -Math.PI / 2;
    cl.position.y = 0.02;
    sceneGroup.add(cl);

    sceneGroup.add(makeDashedLine(-3.5, 0, roadLen, true));
    sceneGroup.add(makeDashedLine(3.5, 0, roadLen, true));
    sceneGroup.add(makeLaneGlow(3.5, 0, roadLen, true));

    // Pods
    const pods = [];
    for (let i = 0; i < params.podCount; i++) {
      const p = makePod();
      p.position.set(3.5, 0, -35 + i * params.podGap);
      sceneGroup.add(p);
      pods.push(p);
    }

    // Regular cars
    const carTypes = ['sedan', 'suv', 'van', 'taxi', 'hatchback-sports', 'sedan-sports'];
    const carCount = Math.round(6 * params.buildingCountMultiplier);
    for (let i = 0; i < carCount; i++) {
      const car = await loadCarOrBox(carTypes[i % carTypes.length]);
      car.position.set(-3.5, 0, -30 + i * params.carSpacing);
      car.rotation.y = Math.PI;
      sceneGroup.add(car);
    }

    // Buildings along both sides — use setback, face the street
    const bNames = ['building-a', 'building-b', 'building-c', 'building-d', 'building-e',
                    'building-f', 'building-g', 'building-h', 'building-i', 'building-j'];
    const bCount = Math.round(5 * params.buildingCountMultiplier);
    for (let i = 0; i < bCount; i++) {
      await placeBuilding('commercial', bNames[i % bNames.length],
        -params.buildingSetback, -30 + i * params.buildingSpacing, 'right');
    }
    for (let i = 0; i < bCount; i++) {
      await placeBuilding('commercial', bNames[(i + 5) % bNames.length],
        params.buildingSetback, -30 + i * params.buildingSpacing, 'left');
    }

    // Labels
    makeLabel3D('Regular Traffic\n' + carCount + ' cars, big gaps', -3.5, 5, -36, 0xff6666);
    makeLabel3D('Pod Platoon\n' + params.podCount + ' pods, tight gaps', 3.5, 5, -36, POD_TEAL);

    animationCallbacks.push((dt) => {
      pods.forEach(p => {
        p.position.z += dt * params.podSpeed;
        if (p.position.z > 40) p.position.z -= 75;
      });
    });

    camera.position.set(22, 16, 22);
    controls.target.set(0, 0, -5);
  }
});

// ───────────── Scene 2: City Block - Before & After ─────────────
SCENES.push({
  name: 'City Block — Before & After',
  desc: 'Left half: standard city intersection. Right half: redesigned with pod lane, wider sidewalks, more trees.',
  setup: async () => {
    addGround();

    // Divider
    const divider = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 8, 60),
      new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 })
    );
    divider.position.set(0, 4, 0);
    sceneGroup.add(divider);

    // === BEFORE (left) ===
    const roadBefore = await loadModel('road', 'road-crossroad');
    if (roadBefore) { roadBefore.position.set(-18, 0, 0); sceneGroup.add(roadBefore); }
    for (let i = -3; i <= 3; i++) {
      if (i === 0) continue;

    );
    sideR.rotation.x = -Math.PI / 2;
    sideR.position.set(0, 0.005, 18);
    sideR.receiveShadow = true;
    sceneGroup.add(sideR);

    const intrs = await loadModel('road', 'road-intersection-path');
    if (intrs) { intrs.position.set(0, 0, 0); sceneGroup.add(intrs); }

    for (let i = -3; i <= 3; i++) {
      if (i === 0) continue;
      const rs = await loadModel('road', 'road-straight');
      if (rs) { rs.position.set(i * 8, 0, 0); rs.rotation.y = Math.PI / 2; sceneGroup.add(rs); }
    }

    sceneGroup.add(makeLaneGlow(0, -1.5, 60, false));

    const mainPods = [];
    for (let i = 0; i < 8; i++) {
      const p = makePod(0.7);
      p.rotation.y = -Math.PI / 2;
      p.position.set(-28 + i * params.podGap, 0, -1.5);
      sceneGroup.add(p);
      mainPods.push(p);
    }

    const mergePods = [];
    for (let i = 0; i < 4; i++) {
      const p = makePod(0.7);
      p.position.set(0, 0, 30 + i * params.podGap);
      sceneGroup.add(p);
      mergePods.push({ mesh: p, startZ: 30 + i * params.podGap, delay: i * 0.8, timer: 0 });
    }

    // Buildings — face the main road (horizontal, z=0)
    for (let i = 0; i < Math.round(3 * params.buildingCountMultiplier); i++) {
      await placeBuilding('commercial', `building-${String.fromCharCode(97 + (i % 10))}`,
        -20 + i * 18, -params.buildingSetback * 0.8, 'top');
    }
    for (let i = 0; i < Math.round(2 * params.buildingCountMultiplier); i++) {
      await placeBuilding('commercial', `building-${String.fromCharCode(107 + (i % 3))}`,
        -10 + i * 20, params.buildingSetback * 0.6, 'bottom');
    }

    // Trees
    for (let i = 0; i < Math.round(4 * params.treeCountMultiplier); i++) {
      const t = await loadTree('nature_pine');
      t.position.set(-22 + i * 14, 0, 8);
      sceneGroup.add(t);
    }

    makeLabel3D('Merging into platoon', 0, 5, 25, POD_TEAL);

    animationCallbacks.push((dt) => {
      mainPods.forEach(p => {
        p.position.x += dt * params.podSpeed * 1.2;
        if (p.position.x > 30) p.position.x -= 58;
      });

      mergePods.forEach(mp => {
        mp.timer += dt;
        if (mp.timer < mp.delay) return;
        const t = mp.timer - mp.delay;
        const approachDuration = 3.0;
        const mergeDuration = 2.0;

        if (t < approachDuration) {
          mp.mesh.position.z = mp.startZ - t * 8;
          mp.mesh.rotation.y = 0;
        } else if (t < approachDuration + mergeDuration) {
          const mt = (t - approachDuration) / mergeDuration;
          const ease = mt * mt * (3 - 2 * mt);
          mp.mesh.position.z = THREE.MathUtils.lerp(mp.startZ - approachDuration * 8, -1.5, ease);
          mp.mesh.position.x = ease * 8;
          mp.mesh.rotation.y = THREE.MathUtils.lerp(0, -Math.PI / 2, ease);
        } else {
          mp.mesh.position.x += dt * params.podSpeed * 1.2;
          mp.mesh.position.z = -1.5;
          mp.mesh.rotation.y = -Math.PI / 2;
          if (mp.mesh.position.x > 30) { mp.mesh.position.x = -28; mp.timer = 0; }
        }
      });
    });

    camera.position.set(8, 10, 18);
    controls.target.set(0, 0, 4);
  }
});

        departPod.position.z = THREE.MathUtils.lerp(departPod.position.z, 2, ease * 0.3);
        departPod.rotation.y = THREE.MathUtils.lerp(0, Math.PI / 2, ease);
      }
    });

    camera.position.set(18, 14, 22);
    controls.target.set(2, 0, 2);
  }
});

let _haightDataCache = null;
async function loadHaightData() {
  if (_haightDataCache) return _haightDataCache;
  const resp = await fetch('data/haight-processed.json');
  _haightDataCache = await resp.json();
  return _haightDataCache;
}

function makeRoadRibbon(points, width) {
  // Build a flat ribbon following the polyline
  const shape = new THREE.Shape();
  if (points.length < 2) return null;

  // Compute offset points on left and right sides
  const left = [];
  const right = [];

  for (let i = 0; i < points.length; i++) {
    let nx, nz; // normal direction
    if (i === 0) {
      const dx = points[1][0] - points[0][0];
      const dz = points[1][1] - points[0][1];
      const len = Math.sqrt(dx * dx + dz * dz) || 1;
      nx = -dz / len;
      nz = dx / len;
    } else if (i === points.length - 1) {
      const dx = points[i][0] - points[i - 1][0];
      const dz = points[i][1] - points[i - 1][1];
      const len = Math.sqrt(dx * dx + dz * dz) || 1;
      nx = -dz / len;
      nz = dx / len;
    } else {
      const dx1 = points[i][0] - points[i - 1][0];
      const dz1 = points[i][1] - points[i - 1][1];
      const dx2 = points[i + 1][0] - points[i][0];
      const dz2 = points[i + 1][1] - points[i][1];
      const len1 = Math.sqrt(dx1 * dx1 + dz1 * dz1) || 1;
      const len2 = Math.sqrt(dx2 * dx2 + dz2 * dz2) || 1;
      nx = -(dz1 / len1 + dz2 / len2) / 2;
      nz = (dx1 / len1 + dx2 / len2) / 2;
      const nLen = Math.sqrt(nx * nx + nz * nz) || 1;
      nx /= nLen;
      nz /= nLen;
    }
    const hw = width / 2;
    left.push([points[i][0] + nx * hw, points[i][1] + nz * hw]);
    right.push([points[i][0] - nx * hw, points[i][1] - nz * hw]);
  }

  // Build shape: left side forward, then right side backward
  shape.moveTo(left[0][0], left[0][1]);
  for (let i = 1; i < left.length; i++) {
    shape.lineTo(left[i][0], left[i][1]);
  }
  for (let i = right.length - 1; i >= 0; i--) {
    shape.lineTo(right[i][0], right[i][1]);
  }
  shape.closePath();

  const geo = new THREE.ShapeGeometry(shape);
  return geo;
}

SCENES.push({
  name: 'Haight-Ashbury',
  desc: 'Real OpenStreetMap data of the Haight-Ashbury neighborhood in San Francisco, with pod platoons on Haight Street.',
  setup: async () => {
    const data = await loadHaightData();
    const { bounds, roads, buildings } = data;

    // Ground plane with padding
    const padX = (bounds.maxX - bounds.minX) * 0.1;
    const padZ = (bounds.maxZ - bounds.minZ) * 0.1;
    const gw = bounds.maxX - bounds.minX + padX * 2;
    const gz = bounds.maxZ - bounds.minZ + padZ * 2;
    const cx = (bounds.minX + bounds.maxX) / 2;
    const cz = (bounds.minZ + bounds.maxZ) / 2;

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(gw, gz),
      new THREE.MeshStandardMaterial({ color: 0xC8C4A0, roughness: 0.95 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.set(cx, -0.02, -cz);
    ground.receiveShadow = true;
    sceneGroup.add(ground);

    // Road widths by type
    const roadWidths = {
      primary: 14, secondary: 11, tertiary: 9,
      residential: 8, service: 5,
      footway: 2, path: 2, cycleway: 2, pedestrian: 2,
      steps: 0, stairs: 0,
    };

    // Render roads
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.9 });
    const footwayMat = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.9 });

    // Track Haight St segments for pod animation
    const haightSegments = [];

    for (const road of roads) {
      const rtype = road.type;
      if (rtype === 'steps' || rtype === 'stairs') continue;

      const isFootway = ['footway', 'path', 'cycleway', 'pedestrian'].includes(rtype);
      if (isFootway && !params.sfShowFootways) continue;

      const baseWidth = roadWidths[rtype] || 7;
      const width = baseWidth * params.sfRoadWidth;

      // Convert points: negate Z for Three.js coordinate system
      const pts = road.points.map(([x, z]) => [x, -z]);

      const geo = makeRoadRibbon(pts, width);
      if (!geo) continue;

      const mesh = new THREE.Mesh(geo, isFootway ? footwayMat : roadMat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.y = 0.01;
      mesh.receiveShadow = true;
      sceneGroup.add(mesh);

      // Collect Haight St segments
      if (road.name && road.name.includes('Haight')) {
        haightSegments.push(pts);
      }
    }

    // Building color palettes
    const apartmentColors = [0xB86B4A, 0xC47A55, 0xA85E3F, 0xBB7755, 0xCC8866];
    const commercialColors = [0xD4C8B0, 0xC8BFA8, 0xDDD4C0, 0xCCC4AA];
    const defaultColors = [0xA09888, 0xB0A898, 0xC0B8A8, 0x988878, 0xBBAA99, 0xAA9988];

    if (params.sfShowBuildings) {
      for (const bldg of buildings) {
        if (bldg.polygon.length < 3) continue;

        // Build shape from polygon (negate Z)
        const shape = new THREE.Shape();
        const pts = bldg.polygon.map(([x, z]) => [x, -z]);
        shape.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < pts.length; i++) {
          shape.lineTo(pts[i][0], pts[i][1]);
        }

        const height = bldg.height * params.sfBuildingScale;

        let color;
        if (bldg.type === 'apartments') {
          color = apartmentColors[Math.floor(Math.random() * apartmentColors.length)];
        } else if (bldg.type === 'commercial' || bldg.type === 'retail') {
          color = commercialColors[Math.floor(Math.random() * commercialColors.length)];
        } else {
          color = defaultColors[Math.floor(Math.random() * defaultColors.length)];
        }

        const mat = new THREE.MeshStandardMaterial({
          color,
          roughness: 0.85,
          metalness: 0.05,
          transparent: params.sfBuildingOpacity < 1,
          opacity: params.sfBuildingOpacity,
        });

        const extrudeSettings = { depth: height, bevelEnabled: false };
        const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        const mesh = new THREE.Mesh(geo, mat);

        // ExtrudeGeometry extrudes in Z — rotate so it goes up (Y)
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.y = 0;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        sceneGroup.add(mesh);
      }
    }

    // Build a continuous Haight Street path for pod animation
    // Concatenate all Haight segments into one polyline, sorted roughly by X
    let haightPath = [];
    if (haightSegments.length > 0) {
      // Sort segments so they roughly go left-to-right
      const sorted = haightSegments.slice().sort((a, b) => a[0][0] - b[0][0]);
      for (const seg of sorted) {
        if (haightPath.length > 0) {
          // Check if we should reverse this segment to connect
          const lastPt = haightPath[haightPath.length - 1];
          const distToStart = Math.hypot(seg[0][0] - lastPt[0], seg[0][1] - lastPt[1]);
          const distToEnd = Math.hypot(seg[seg.length - 1][0] - lastPt[0], seg[seg.length - 1][1] - lastPt[1]);
          if (distToEnd < distToStart) seg.reverse();
        }
        haightPath.push(...seg);
      }
    }

    // Place pod platoon along Haight Street
    if (haightPath.length > 2) {
      // Compute cumulative distances along the path
      const cumDist = [0];
      for (let i = 1; i < haightPath.length; i++) {
        const dx = haightPath[i][0] - haightPath[i - 1][0];
        const dz = haightPath[i][1] - haightPath[i - 1][1];
        cumDist.push(cumDist[i - 1] + Math.sqrt(dx * dx + dz * dz));
      }
      const totalLen = cumDist[cumDist.length - 1];

      // Interpolate position along path
      function interpPath(dist) {
        const d = ((dist % totalLen) + totalLen) % totalLen;
        for (let i = 1; i < cumDist.length; i++) {
          if (cumDist[i] >= d) {
            const t = (d - cumDist[i - 1]) / (cumDist[i] - cumDist[i - 1]);
            const x = haightPath[i - 1][0] + t * (haightPath[i][0] - haightPath[i - 1][0]);
            const z = haightPath[i - 1][1] + t * (haightPath[i][1] - haightPath[i - 1][1]);
            const dx = haightPath[i][0] - haightPath[i - 1][0];
            const dz = haightPath[i][1] - haightPath[i - 1][1];
            const angle = Math.atan2(dx, dz);
            return { x, z, angle };
          }
        }
        return { x: haightPath[0][0], z: haightPath[0][1], angle: 0 };
      }

      // Place pods
      const podCount = 8;
      const podGap = params.podGap;
      const podGroup = [];
      for (let i = 0; i < podCount; i++) {
        const p = makePod(0.7);
        sceneGroup.add(p);
        podGroup.push({ mesh: p, offset: i * podGap });
      }

      // Lane glow along Haight — ribbon + edge lines
      const glowRibbonGeo = makeRoadRibbon(haightPath, 4.0);
      if (glowRibbonGeo) {
        const glowRibbon = new THREE.Mesh(glowRibbonGeo,
          new THREE.MeshStandardMaterial({ color: LANE_ACCENT, transparent: true, opacity: params.laneGlowOpacity * 1.5, emissive: LANE_ACCENT, emissiveIntensity: 0.3 })
        );
        glowRibbon.rotation.x = -Math.PI / 2;
        glowRibbon.position.y = 0.015;
        sceneGroup.add(glowRibbon);
      }
      // Edge glow lines
      const glowPts = haightPath.map(([x, z]) => new THREE.Vector3(x, 0.025, z));
      if (glowPts.length > 1) {
        const glowGeo = new THREE.BufferGeometry().setFromPoints(glowPts);
        const glowLine = new THREE.Line(glowGeo,
          new THREE.LineBasicMaterial({ color: LANE_ACCENT, transparent: true, opacity: 0.7 })
        );
        sceneGroup.add(glowLine);
      }

      let podDist = 0;
      animationCallbacks.push((dt) => {
        podDist += dt * params.podSpeed * 3;
        for (const { mesh, offset } of podGroup) {
          const pos = interpPath(podDist - offset);
          mesh.position.set(pos.x, 0, pos.z);
          mesh.rotation.y = pos.angle;
        }
      });
    }

    // Override fog for this large scene — exponential fog kills visibility at city scale
    scene.fog = new THREE.FogExp2(SKY_COL, 0.0005);

    // Boost lighting for the larger scene
    sunLight.intensity = 2.5;
    sunLight.position.set(400, 600, 300);
    ambientLight.intensity = 0.8;

    // Camera: above looking down at ~45 degrees
    const viewCx = cx;
    const viewCz = -cz;
    camera.position.set(viewCx + 150, 250, viewCz + 150);
    controls.target.set(viewCx, 0, viewCz);
  }
});

SCENES.push({
  name: 'Airflow / Drafting Physics',
  desc: 'Pods tuck in behind each other, smoothing airflow and saving energy. Watch the energy meter as the platoon grows to 10.',
  setup: async () => {
    addGround();
    scene.background.set(0x1a1a2e);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.003);
    ambientLight.intensity = 0.3;
    sunLight.intensity = 1.0;

    // Road (side view, running along X)
    const roadLen = 120;
    const road = new THREE.Mesh(
      new THREE.PlaneGeometry(roadLen, 6),
      new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.9 })
    );
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0.005, 0);
    road.receiveShadow = true;
    sceneGroup.add(road);

    sceneGroup.add(makeLaneGlow(0, 0, roadLen, false));

    // Airflow line helper — creates curved tubes representing airflow
    function makeAirflowLines(startX, endX, yCenter, count, turbulence, color, opacity) {
      const g = new THREE.Group();
      for (let i = 0; i < count; i++) {
        const yOff = (i - count / 2) * 0.35;
        const pts = [];
        const steps = 30;
        for (let s = 0; s <= steps; s++) {
          const t = s / steps;
          const x = startX + (endX - startX) * t;
          const turb = turbulence * Math.sin(t * Math.PI * 3 + i * 0.7) * (1 - Math.abs(t - 0.5) * 1.2);
          pts.push(new THREE.Vector3(x, yCenter + yOff + turb, 0.2 * Math.sin(t * Math.PI + i)));
        }
        const curve = new THREE.CatmullRomCurve3(pts);
        const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.03, 4, false);
        const tubeMat = new THREE.MeshStandardMaterial({
          color, emissive: color, emissiveIntensity: 0.8,
          transparent: true, opacity
        });
        g.add(new THREE.Mesh(tubeGeo, tubeMat));
      }
      return g;
    }

    // Energy meter (2D overlay-style bar using 3D)
    const meterBg = new THREE.Mesh(
      new THREE.PlaneGeometry(1.5, 12),
      new THREE.MeshStandardMaterial({ color: 0x333344, transparent: true, opacity: 0.7 })
    );
    meterBg.position.set(-50, 6, -4);
    sceneGroup.add(meterBg);

    const meterFill = new THREE.Mesh(
      new THREE.PlaneGeometry(1.2, 0.1),
      new THREE.MeshStandardMaterial({ color: POD_TEAL, emissive: POD_TEAL, emissiveIntensity: 1.5 })
    );
    meterFill.position.set(-50, 0.5, -3.99);
    sceneGroup.add(meterFill);

    makeLabel3D('Energy Use', -50, 13, -4, POD_TEAL);

    // State
    const maxPods = 10;
    const podMeshes = [];
    const airflowGroups = [];
    let activePods = 1;
    let joinTimer = 0;
    const joinInterval = 2.5; // seconds between pod joins
    let savedLabel = null;

    // Create first pod
    const firstPod = makePod(0.85);
    firstPod.rotation.y = -Math.PI / 2;
    firstPod.position.set(0, 0, 0);
    sceneGroup.add(firstPod);
    podMeshes.push(firstPod);

    // Initial turbulent airflow for solo pod
    const soloAir = makeAirflowLines(3, 14, 0.8, 8, 0.5, 0xff6644, 0.4);
    sceneGroup.add(soloAir);
    airflowGroups.push(soloAir);

    // Front pressure lines (always present on lead pod)
    const frontAir = makeAirflowLines(-14, -2, 0.8, 6, 0.15, 0x66aaff, 0.35);
    sceneGroup.add(frontAir);

    function updateSavedLabel() {
      if (savedLabel) { sceneGroup.remove(savedLabel); savedLabel.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); }); }
      const fleetSavings = activePods <= 1 ? '0%' : `${Math.round(activePods * 1.6)}%`;
      makeLabel3D(`${activePods}-pod platoon: ${fleetSavings} fleet savings`, 0, 5, -4, POD_TEAL);
    }
    updateSavedLabel();

    animationCallbacks.push((dt) => {
      joinTimer += dt;

      if (joinTimer > joinInterval && activePods < maxPods) {
        activePods++;
        joinTimer = 0;

        // Add new pod tucking in behind
        const newPod = makePod(0.85);
        newPod.rotation.y = -Math.PI / 2;
        const gap = 2.0;
        newPod.position.set(-(activePods - 1) * gap, 0, 0);
        sceneGroup.add(newPod);
        podMeshes.push(newPod);

        // Remove old airflow, add smoother version
        airflowGroups.forEach(ag => { sceneGroup.remove(ag); ag.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); }); });
        airflowGroups.length = 0;

        const turbulence = Math.max(0.05, 0.5 - activePods * 0.045);
        const wakeAir = makeAirflowLines(2, 14, 0.8, 8, turbulence,
          activePods > 6 ? POD_TEAL : 0xff6644,
          0.3 + activePods * 0.03);
        sceneGroup.add(wakeAir);
        airflowGroups.push(wakeAir);

        // Smooth inter-pod airflow
        if (activePods > 1) {
          const interAir = makeAirflowLines(-(activePods - 1) * gap + 1.5, 0.5, 0.8, 5, turbulence * 0.5, POD_TEAL, 0.25);
          sceneGroup.add(interAir);
          airflowGroups.push(interAir);
        }

        // Update meter
        const savings = activePods * 1.6;
        const fillH = Math.min(savings / 20 * 11, 11);
        meterFill.scale.y = fillH / 0.1;
        meterFill.position.y = 0.5 + fillH / 2;

        updateSavedLabel();
      }

      // Cycle: after reaching max, wait 3s then reset
      if (activePods >= maxPods && joinTimer > 3) {
        // Reset
        podMeshes.forEach(p => { sceneGroup.remove(p); });
        podMeshes.length = 0;
        airflowGroups.forEach(ag => { sceneGroup.remove(ag); ag.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); }); });
        airflowGroups.length = 0;
        activePods = 1;
        joinTimer = 0;

        const fp = makePod(0.85);
        fp.rotation.y = -Math.PI / 2;
        fp.position.set(0, 0, 0);
        sceneGroup.add(fp);
        podMeshes.push(fp);

        const sa = makeAirflowLines(3, 14, 0.8, 8, 0.5, 0xff6644, 0.4);
        sceneGroup.add(sa);
        airflowGroups.push(sa);

        meterFill.scale.y = 1;
        meterFill.position.y = 0.5;
        updateSavedLabel();
      }
    });

    // Side view camera — tightened to frame road action
    camera.position.set(0, 5, 18);
    controls.target.set(0, 1.5, 0);
  }
});

        if (x < morphStart) {
          // Highway: full truck
          v.truck.visible = true;
          v.pod.visible = false;
          v.truck.scale.setScalar(1);
        } else if (x >= morphStart && x <= morphEnd) {
          // Morph zone
          const t = (x - morphStart) / (morphEnd - morphStart);
          const ease = t * t * (3 - 2 * t);
          v.truck.visible = true;
          v.pod.visible = true;
          // Truck shrinks
          const truckScale = 1 - ease;
          v.truck.scale.setScalar(Math.max(0.01, truckScale));
          v.truck.traverse(c => { if (c.material) { c.material.transparent = true; c.material.opacity = 1 - ease; } });
          // Pod grows
          v.pod.scale.setScalar(ease);
          v.pod.traverse(c => { if (c.material) { c.material.transparent = true; c.material.opacity = ease; } });
          // Lane position narrows
          v.truck.position.z = THREE.MathUtils.lerp(-3, 0, ease);
          v.pod.position.z = v.truck.position.z;
          v.pod.position.x = v.truck.position.x;
        } else {
          // City: pod only
          v.truck.visible = false;
          v.pod.visible = true;
          v.pod.scale.setScalar(1);
          v.pod.position.z = 0;
          v.pod.traverse(c => { if (c.material) { c.material.transparent = false; c.material.opacity = 1; } });
        }

        // Loop
        if (v.truck.position.x > 55) {
          v.truck.position.x = v.startX;
          v.pod.position.x = v.startX;
          v.truck.position.z = -3;
          v.pod.position.z = -3;
          v.truck.scale.setScalar(1);
          v.truck.visible = true;
          v.pod.visible = false;
          v.truck.traverse(c => { if (c.material) { c.material.transparent = false; c.material.opacity = 1; } });
        }
      });
    });

    camera.position.set(5, 18, 35);
    controls.target.set(5, 0, 0);
  }
});

        fd.mesh.position.copy(pos);

/* ═══════════════════ SCENE MANAGEMENT ═══════════════════ */
let currentIdx = 0;
let rebuilding = false;

window.loadScene = loadScene;
window.getDebug = () => ({ rebuilding, currentIdx, sceneCount: SCENES.length });
async function loadScene(idx) {
  if (rebuilding) return;
  rebuilding = true;
  currentIdx = idx;

  // Safety timeout — if setup hangs (e.g. GLB loading), force unlock after 30s
  const safetyTimer = setTimeout(() => {
    rebuilding = false;
    document.getElementById('loading').style.display = 'none';
  }, 30000);

  clearScene();

  // Reset lighting
  sunLight.color.set(WARM_LIGHT);
  sunLight.intensity = params.sunIntensity;
  sunLight.position.set(30, 40, 20);
  ambientLight.color.set(0xffffff);
  ambientLight.intensity = params.ambientIntensity;
  scene.background.set(SKY_COL);
  scene.fog = new THREE.FogExp2(SKY_COL, params.fogDensity);

  const s = SCENES[idx];
  document.getElementById('scene-title').textContent = s.name;
  document.getElementById('scene-desc').textContent = s.desc;
  document.getElementById('scene-counter').textContent = `Scene ${idx + 1} of ${SCENES.length}`;
  document.querySelectorAll('#scene-list button').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('loading').style.display = 'block';
  await s.setup();
  document.getElementById('loading').style.display = 'none';
  clearTimeout(safetyTimer);
  rebuilding = false;
}

function rebuild() { loadScene(currentIdx); }

// Build scene list
const listEl = document.getElementById('scene-list');
SCENES.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = `${i + 1}. ${s.name}`;
  btn.onclick = () => { currentIdx = i; loadScene(i); };
  listEl.appendChild(btn);
});

// URL hash support: #1 through #11
const hashScene = parseInt(location.hash.replace('#', '')) - 1;
if (hashScene >= 0 && hashScene < SCENES.length) {
  currentIdx = hashScene;
  loadScene(hashScene);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    currentIdx = (currentIdx + 1) % SCENES.length;
    loadScene(currentIdx);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    currentIdx = (currentIdx - 1 + SCENES.length) % SCENES.length;
    loadScene(currentIdx);
  } else if (e.key >= '1' && e.key <= '9') {
    const i = +e.key - 1;
    if (i < SCENES.length) { currentIdx = i; loadScene(i); }
  } else if (e.key === '0') {
    // 0 = scene 10
    const i = 9;
    if (i < SCENES.length) { currentIdx = i; loadScene(i); }
  } else if (e.key === 'g' || e.key === 'G') {
    gui._hidden ? gui.show() : gui.hide();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ═══════════════════ ANIMATION LOOP ═══════════════════ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  animationCallbacks.forEach(cb => cb(dt));
  controls.update();
  renderer.render(scene, camera);
}

// Init
async function init() {
  animate();
  await loadScene(0);
}
init();
</script>
